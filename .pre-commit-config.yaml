# Pre-commit hooks for korean-doc-parser
# Setup (once per clone):   uv run pre-commit install
# Manual run on all files:  uv run pre-commit run --all-files
#
# Local hooks reuse the uv-managed environment so versions match pyproject.toml.

repos:
  # ────────────────────────────────────────────────────────────────────────
  # Basic hygiene
  # ────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(benchmarks/results/.*|samples/.*)'
      - id: end-of-file-fixer
        exclude: '^(benchmarks/results/.*|samples/.*)'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ────────────────────────────────────────────────────────────────────────
  # Ruff (lint + format) and mypy (strict) — via uv environment
  # ────────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (--fix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        pass_filenames: false
        types: [python]
        files: ^packages/.*/src/

  # ────────────────────────────────────────────────────────────────────────
  # Secret scanning (CLAUDE.md §"시크릿 / 자격증명")
  # ────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
