# Workspace root for korean-doc-parser monorepo.
#
# This file is NOT a publishable package. uv treats this directory as a
# virtual workspace root and the three `packages/*` are the actual
# publishable units.
#
# Usage:
#   uv sync                  # install all workspace members + dev tools
#   uv run pytest            # run tests across the workspace
#   uv run ruff check .      # lint
#   uv run ruff format .     # auto-format
#   uv run mypy              # type check

[tool.uv.workspace]
members = ["packages/core", "packages/hwp", "packages/pipeline"]

[tool.uv.sources]
korean-doc-parser = { workspace = true }
korean-doc-parser-hwp = { workspace = true }
korean-doc-parser-pipeline = { workspace = true }

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "mypy>=1.10",
  "ruff>=0.5",
  "pre-commit>=3.7",
  # Fixture generation helpers (tests only)
  "python-docx>=1.0",
  "python-pptx>=1.0",  # synthetic PPTX fixtures (v0.3)
  "pillow>=10.0",
  "reportlab>=4.0",  # synthetic PDF fixtures
]

# ────────────────────────────────────────────────────────────────────────────
# ruff — linter + formatter (CLAUDE.md: line length 100)
# ────────────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py311"
src = [
  "packages/core/src",
  "packages/hwp/src",
  "packages/pipeline/src",
]
extend-exclude = [
  "samples",
  ".venv",
]

[tool.ruff.lint]
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # pyflakes
  "I",      # isort
  "B",      # flake8-bugbear
  "UP",     # pyupgrade
  "N",      # pep8-naming
  "RUF",    # ruff-specific
  "C4",     # flake8-comprehensions
  "SIM",    # flake8-simplify
  "TID",    # flake8-tidy-imports
  "PTH",    # flake8-use-pathlib (CLAUDE.md: Path 권장)
]
ignore = [
  "E501",   # line too long — formatter handles this
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["E501", "PLR2004", "S101"]
"**/__init__.py" = ["F401"]
"benchmarks/**" = ["E501", "TID252"]

[tool.ruff.lint.isort]
known-first-party = [
  "korean_doc_parser",
  "korean_doc_parser_hwp",
  "korean_doc_parser_pipeline",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ────────────────────────────────────────────────────────────────────────────
# mypy — strict (CLAUDE.md: mypy strict 통과 필수)
# ────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
files = [
  "packages/core/src",
  "packages/hwp/src",
  "packages/pipeline/src",
]
exclude = [
  "^benchmarks/",
  "^samples/",
  "^\\.venv/",
]

# Third-party libs without stubs — ignore missing imports per-module
[[tool.mypy.overrides]]
module = [
  "pdfplumber.*",
  "docx.*",
  "markitdown.*",
  "hwp5.*",
  "bs4.*",
  "win32com.*",
  "pywintypes",
]
ignore_missing_imports = true

# ────────────────────────────────────────────────────────────────────────────
# pytest — coverage 85% 게이트 (CLAUDE.md 의무)
# ────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = [
  "packages/core/tests",
  "packages/hwp/tests",
  "packages/pipeline/tests",
]
# The ``tests`` package (packages/core/tests/_gt.py, _synth.py) is shared
# across parser-package test suites.
pythonpath = ["packages/core"]
addopts = [
  "-ra",
  "--strict-markers",
  "--strict-config",
  "--showlocals",
]
markers = [
  "slow: 느린 통합 테스트 (LibreOffice 변환 등) — `-m 'not slow'` 로 제외 가능",
  "hwp: HWP 패키지 전용 (pyhwp + COM 필요)",
]

# ────────────────────────────────────────────────────────────────────────────
# coverage.py — pytest-cov 의 백엔드
# ────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = [
  "korean_doc_parser",
  "korean_doc_parser_hwp",
  "korean_doc_parser_pipeline",
]
branch = true
omit = [
  "*/tests/*",
  "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]
# v0.1.1 부터 활성화 (CLAUDE.md §"라이브러리 특화 규칙 §3":
# "pytest 커버리지 85% 미만이면 머지 금지"). 현재 전체 97%, 모든 모듈 96%+.
fail_under = 85
show_missing = true
