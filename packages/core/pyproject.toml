[project]
name = "korean-doc-parser"
version = "0.4.1"
description = "HWP-aware document-to-markdown library for Korean documents"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Brad", email = "vanasso.kr@gmail.com" },
]
keywords = ["korean", "document", "parser", "hwp", "hwpx", "markdown", "rag"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Text Processing :: Markup",
  "Natural Language :: Korean",
]
dependencies = [
  "pdfplumber>=0.11",  # PDF parser (Phase 0 decision: self-implement)
  "pypdf>=4.0",        # PDF bitmap extraction (v0.2 — BSD-3, ~2MB)
  "python-docx>=1.0",  # DOCX parser (Phase 0 decision: self-implement)
  "pillow>=10.0",      # Image dimension/mime inspection
]

# Optional extras — opt-in heavy dependencies isolated from the core
[project.optional-dependencies]
# PPTX support via markitdown (Phase 0 decision: delegate, text 23K vs self 170).
# Heavy ML stack: onnxruntime + numpy + magika ~80MB. Opt-in only.
# Acceptance pending v0.3 N>=5 fixture evaluation (worklog/010).
pptx = ["markitdown[pptx]>=0.1.5"]
# Vision CLI (v0.4) — opt-in Claude Vision labelling via `kdp-label`.
# anthropic SDK is small (~1MB) but needs an API key + network. Opt-in.
# Decisions: worklog/011 (A.1 Sonnet, B.1 2-pass, C.4 sha256 cache, etc).
vision = ["anthropic>=0.40"]

[project.scripts]
# v0.4 CLI — see worklog/011 § 9 for the full interface spec.
kdp-label = "korean_doc_parser.cli.label:main"

[project.urls]
Homepage = "https://github.com/Brad0329/korean-doc-parser"
Repository = "https://github.com/Brad0329/korean-doc-parser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korean_doc_parser"]
