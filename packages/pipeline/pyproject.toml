[project]
name = "korean-doc-parser-pipeline"
version = "0.1.1"
description = "AI ingestion pipeline (Claude Vision labeling, review queue) for korean-doc-parser"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Brad", email = "vanasso.kr@gmail.com" },
]
keywords = ["korean", "document", "parser", "rag", "claude", "vision", "labeling"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Text Processing :: Markup",
  "Natural Language :: Korean",
]
dependencies = [
  "korean-doc-parser",
  # anthropic / pydantic etc. are added in Phase 3 (pipeline implementation)
]

[project.urls]
Homepage = "https://github.com/Brad0329/korean-doc-parser"
Repository = "https://github.com/Brad0329/korean-doc-parser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korean_doc_parser_pipeline"]
