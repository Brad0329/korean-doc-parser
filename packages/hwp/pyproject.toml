[project]
name = "korean-doc-parser-hwp"
version = "0.1.0.dev0"
description = "HWP (Hangul Word Processor) parser extras for korean-doc-parser"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [
  { name = "Brad", email = "vanasso.kr@gmail.com" },
]
keywords = ["hwp", "hangul", "korean", "document", "parser"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Text Processing :: Markup",
  "Natural Language :: Korean",
]
dependencies = [
  "korean-doc-parser",
  # pyhwp / pywin32 are added when the parser is implemented (Phase 1 task #11)
]

[project.urls]
Homepage = "https://github.com/Brad0329/korean-doc-parser"
Repository = "https://github.com/Brad0329/korean-doc-parser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korean_doc_parser_hwp"]
