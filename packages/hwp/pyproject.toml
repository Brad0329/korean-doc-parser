[project]
name = "korean-doc-parser-hwp"
version = "0.4.0"
description = "HWP (Hangul Word Processor) parser extras for korean-doc-parser"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [
  { name = "Brad", email = "vanasso.kr@gmail.com" },
]
keywords = ["hwp", "hangul", "korean", "document", "parser"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Text Processing :: Markup",
  "Natural Language :: Korean",
]
dependencies = [
  "korean-doc-parser",
  "pyhwp>=0.1b15",   # AGPLv3+ — HWP 5.x binary parser (worklog/003 Linux 호환성 확인)
  "six>=1.16",       # pyhwp 0.1b15 의 미선언 transitive dep (workaround)
  "beautifulsoup4>=4.12",  # _xhtml_to_markdown
  "lxml>=5.0",       # BeautifulSoup XML parser backend
]

[project.urls]
Homepage = "https://github.com/Brad0329/korean-doc-parser"
Repository = "https://github.com/Brad0329/korean-doc-parser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korean_doc_parser_hwp"]
